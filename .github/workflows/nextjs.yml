name: Deploy Next.js site to Pages - FIXED

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"  # مباشرة pnpm عشان عندك pnpm-lock.yaml
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next
      
      # FIXED: Cache optional - won't fail if not found
      - name: Cache Next.js
        uses: actions/cache@v4
        id: cache-next
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build with Next.js
        run: pnpm build
      
      # FIXED: Clean everything except static files
      - name: Prepare for deploy
        run: |
          rm -rf node_modules .next .cache pnpm-lock.yaml yarn.lock package-lock.json
          ls -la  # للتأكد إن /out موجود
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
